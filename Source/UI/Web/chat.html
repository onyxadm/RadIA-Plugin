<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rad IA Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="vendor/prism-tomorrow.min.css">
  <script>
    const initialTheme = new URLSearchParams(globalThis.location.search).get('theme');
    const safeInitialTheme = ['light', 'dark'].includes(initialTheme) ? initialTheme : 'light';
    document.documentElement.className = safeInitialTheme + '-theme';

    const fontLink = document.createElement('link');
    fontLink.rel = 'stylesheet';
    fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
    document.head.appendChild(fontLink);
  </script>
  <link rel="stylesheet" href="chat-theme.css">
  <link rel="stylesheet" href="chat.css">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/prism.min.js"></script>
  <script src="vendor/prism-pascal.min.js"></script>
</head>

<body>
  <script>
    document.body.className = safeInitialTheme + '-theme';
  </script>
  <header id="chat-header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#007ACC" />
          <path d="M12 6L13.8 10.2L18 12L13.8 13.8L12 18L10.2 13.8L6 12L10.2 10.2L12 6Z" fill="#FFFFFF" />
        </svg>
      </div>
      <span class="header-title">Rad IA - AI ASSISTANT</span>
    </div>
    <div class="header-right">
      <button class="header-action-btn" id="btn-clear-chat" title="Clear Chat">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"></path>
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
        </svg>
        <span class="btn-label">Clear</span>
      </button>
      <button class="header-action-btn" id="btn-generators" title="Generators">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        <span class="btn-label">Generators</span>
      </button>
      <button class="header-action-btn" id="btn-history" title="Chats">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
          <path d="M8 9h8"></path>
          <path d="M8 13h5"></path>
        </svg>
        <span class="btn-label">Chats</span>
      </button>
      <button class="header-action-btn hidden" id="btn-web-login" title="Connect Web Login">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span class="btn-label">Connect</span>
      </button>
      <button class="header-action-btn" id="btn-settings" title="Settings">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
        <span class="btn-label">Settings</span>
      </button>
    </div>
  </header>

  <div id="main-layout">
    <aside id="sessions-sidebar" class="collapsed">
      <div class="sidebar-header">
        <span>CHATS</span>
        <button id="btn-new-chat-sidebar" title="New Session">+</button>
      </div>
      <div id="sessions-list">
      </div>
    </aside>

    <div id="chat-wrapper">
      <main id="chat-container">
      </main>
      <div id="chat-scrollbar" aria-hidden="true">
        <div id="chat-scrollbar-thumb"></div>
      </div>

      <footer id="chat-footer">
        <div id="context-bar" class="hidden">
          <span id="context-text"></span>
        </div>

        <div id="status-bar" class="hidden">
          <span id="status-text"></span>
        </div>

        <div id="composer-shell">
          <div id="prompt-wrapper">
            <div id="prompt-capsule">
              <textarea id="prompt-textarea" placeholder="Ask Rad IA or type / for commands..." rows="1"></textarea>
              <button id="btn-send-prompt" title="Send message">
                <svg class="send-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </div>

          <div id="model-selectors">
            <div class="selector-wrapper">
              <select id="select-provider" style="display: none;">
                <option value="">Provider...</option>
              </select>
              <div class="custom-dropdown-wrapper" id="provider-dropdown-wrapper">
                <div class="custom-dropdown-trigger" id="provider-dropdown-trigger">
                  <span id="provider-dropdown-value">Provider...</span>
                </div>
                <div class="custom-dropdown-content" id="provider-dropdown-content">
                  <div class="custom-dropdown-options" id="provider-options-list">
                  </div>
                </div>
              </div>
            </div>
            <div class="selector-wrapper">
              <select id="select-model" style="display: none;">
                <option value="">Model...</option>
              </select>
              <div class="custom-dropdown-wrapper" id="model-dropdown-wrapper">
                <div class="custom-dropdown-trigger" id="model-dropdown-trigger">
                  <span id="model-dropdown-value">Model...</span>
                </div>
                <div class="custom-dropdown-content" id="model-dropdown-content">
                  <div class="custom-dropdown-search">
                    <input type="text" id="model-search-input" placeholder="Search model..." autocomplete="off">
                  </div>
                  <div class="custom-dropdown-options" id="model-options-list">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="slash-commands-popup" class="hidden"></div>
      </footer>
    </div>

    <div id="generators-wrapper" class="hidden">
      <main id="generators-container">
        <div class="generator-card">
          <div class="generator-form-group">
            <label for="generator-input">Input (JSON or SQL DDL)</label>
            <textarea id="generator-input" placeholder="Paste your raw JSON payload or SQL DDL statements here..." rows="8"></textarea>
          </div>

          <div class="generator-options-row">
            <div class="generator-form-group">
              <label for="generator-input-type">Input Type</label>
              <select id="generator-input-type">
                <option value="json">JSON</option>
                <option value="ddl">SQL DDL</option>
              </select>
            </div>

            <div class="generator-form-group">
              <label for="generator-output-type">Output Pattern</label>
              <select id="generator-output-type">
                <option value="vanilla">Vanilla Class</option>
                <option value="record">Modern Record</option>
                <option value="restjson">REST.Json Serialization</option>
                <option value="aurelius">Aurelius ORM</option>
                <option value="dext">DEXT ORM</option>
              </select>
            </div>
          </div>

          <button id="btn-generate-model" class="btn-primary-gradient">Generate Model</button>
        </div>

        <div class="generator-preview-card hidden" id="generator-preview-card">
          <div class="code-block-container">
            <div class="code-header">
              <span>Generated Delphi Unit</span>
              <div class="code-header-actions">
                <button class="copy-btn" id="btn-copy-generator" title="Copy Code">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
                <button class="apply-btn" id="btn-insert-generator" title="Insert into Editor">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                  </svg>
                </button>
              </div>
            </div>
            <pre><code class="language-pascal" id="generator-output-code"></code></pre>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="chat-bridge.js"></script>
  <script>
    const chatScript = document.createElement('script');
    chatScript.src = 'chat.js?v=' + Date.now();
    document.body.appendChild(chatScript);
  </script>
</body>

</html>
