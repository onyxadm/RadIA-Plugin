# SonarQube Project Configuration
sonar.projectKey=radia
sonar.projectName=radia
sonar.projectVersion=1.0.0

# Path to the source directories
sonar.sources=Source

# Path to the test directories
sonar.tests=Tests
sonar.test.inclusions=Tests/**/*.pas

# Exclude third-party libraries, build output and test runners from main analysis
sonar.exclusions=Source/UI/Web/vendor/**, Redist/**, Output/**, __local/**, .git/**, .github/**, **/__history/**, **/__history__/**, **/Win32/**, **/Win64/**, **/Debug/**, **/Release/**, **/*.dcu, **/*.exe, **/*.dll, **/*.bpl, **/*.res, **/*.dcp, **/*.rsm, **/*.map, **/*.identcache, **/*.dsk, **/*.~*

# Source encoding
sonar.sourceEncoding=UTF-8

# Delphi (Object Pascal) file patterns
sonar.lang.patterns.pas=**/*.pas
